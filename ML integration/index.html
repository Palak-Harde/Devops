<!DOCTYPE html>
<html>
<head>
    <title>Student Cluster Prediction</title>
</head>
<body>
    <h2>Student Cluster Prediction</h2>
    <form method="POST">
        <label>Important Factor:</label>
        <input type="text" name="important_factor" required><br><br>

        <label>Daily Routine:</label>
        <input type="text" name="daily_routine" required><br><br>

        <label>Social Activity:</label>
        <input type="text" name="social_activity" required><br><br>

        <label>Expense Sharing:</label>
        <input type="text" name="expense_sharing" required><br><br>

        <label>Deal Breaker:</label>
        <input type="text" name="deal_breaker" required><br><br>

        <label>Hobbies Importance:</label>
        <input type="text" name="hobbies_importance" required><br><br>

        <button type="submit">Predict Cluster</button>
    </form>

    {% if prediction is not none %}
        <h3>Predicted Cluster: {{ prediction }}</h3>
    {% endif %}
</body>
</html>
