<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roomzy Match Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h2 {
      margin-top: 50px;
      font-size: 2.2em;
      text-align: center;
      color: #fff;
    }

    h3 {
      text-align: center;
      color: #dbeafe;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 30px;
      width: 90%;
      max-width: 1100px;
    }

    .profile-card {
      background: white;
      color: #333;
      border-radius: 16px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      padding: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
      
    }

    .profile-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .profile-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #007bff, #00c6ff);
    }

    .profile-card h4 {
      margin: 0 0 10px 0;
      color: #007bff;
      font-weight: 600;
    }

    .profile-card p {
      margin: 4px 0;
      font-size: 0.95em;
    }

    a.button {
      display: inline-block;
      margin: 20px auto;
      text-decoration: none;
      background: white;
      color: #007bff;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    a.button:hover {
      background: #007bff;
      color: white;
    }

    footer {
      margin-top: auto;
      padding: 20px;
      color: #cbd5e1;
      font-size: 0.9em;
    }
    .avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
}

  </style>
</head>
<body>
  <h2>🎯 You belong to Cluster {{ cluster }}</h2>
  <h3>Here are your compatible roommate profiles:</h3>

  <div class="card-container">
    {% for profile in profiles %}
    <div class="profile-card">
        <img src="{{ profile.PhotoURL }}" alt="Profile" class="avatar">
       
      <h4>Roommate {{ loop.index }}</h4>
      {% for key, value in profile.items() %}
        <p><strong>{{ key }}:</strong> {{ value }}</p>
      {% endfor %}
    </div>
    {% endfor %}
  </div>

  <a href="/" class="button">🔙 Find Again</a>

  <footer>Roomzy © 2025 — Smart Matchmaking Powered by ML</footer>
</body>
</html>
